<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Theme Graph</title>
    <style>
      :root {
        --bg: #000000;
        --panel: rgba(10, 10, 10, 0.94);
        --panel-surface: #141414;
        --panel-border: rgba(65, 65, 65, 0.8);
        --panel-border-strong: #5a5a5a;
        --text: #ffffff;
        --muted: #a0a0a0;
        --theme: #faff69;
        --supplemental-theme: #166534;
        --wikilink: #d9d9d9;
        --edge: rgba(255, 255, 255, 0.38);
        --accent: #faff69;
        --accent-soft: #f4f692;
        --accent-border: #4f5100;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(
            circle at 12% 16%,
            rgba(250, 255, 105, 0.05),
            transparent 28%
          ),
          radial-gradient(
            circle at 84% 12%,
            rgba(22, 101, 52, 0.08),
            transparent 24%
          ),
          radial-gradient(
            circle at 72% 78%,
            rgba(250, 255, 105, 0.035),
            transparent 32%
          ),
          radial-gradient(
            circle at 24% 82%,
            rgba(255, 255, 255, 0.025),
            transparent 26%
          ),
          var(--bg);
        color: var(--text);
        font-family:
          Inter, "Segoe UI", "PingFang TC", "Noto Sans TC",
          "Microsoft JhengHei", sans-serif;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
        isolation: isolate;
      }

      #app::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(
            circle at 14% 18%,
            rgba(250, 255, 105, 0.09),
            transparent 30%
          ),
          radial-gradient(
            circle at 82% 12%,
            rgba(22, 101, 52, 0.12),
            transparent 26%
          ),
          radial-gradient(
            circle at 72% 74%,
            rgba(250, 255, 105, 0.06),
            transparent 34%
          ),
          radial-gradient(
            circle at 28% 80%,
            rgba(255, 255, 255, 0.032),
            transparent 28%
          );
      }

      svg {
        position: relative;
        z-index: 1;
        display: block;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 48px 48px;
      }

      .panel {
        position: absolute;
        z-index: 2;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        backdrop-filter: blur(12px);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.02),
          0 18px 48px rgba(0, 0, 0, 0.42),
          inset 0 4px 24px rgba(0, 0, 0, 0.18);
      }

      #header {
        top: 16px;
        left: 16px;
        width: min(400px, calc(100vw - 32px));
        padding: 16px 18px 18px;
      }

      #header h1 {
        margin: 0 0 10px;
        font-size: 30px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.04em;
      }

      #header p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.65;
      }

      #stats {
        top: 16px;
        right: 16px;
        min-width: 248px;
        padding: 14px 16px 16px;
      }

      #stats h2,
      #details h2,
      #company-panel h2 {
        margin: 0 0 10px;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }

      #stats .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 10px 0;
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
      }

      #stats .row span:last-child {
        color: var(--accent);
        font-family:
          Inconsolata, Consolas, "SFMono-Regular", "Liberation Mono", monospace;
        font-size: 18px;
        font-weight: 700;
      }

      #company-panel {
        top: auto;
        left: 16px;
        bottom: 16px;
        width: min(560px, calc(100vw - 32px));
        max-height: min(64vh, 660px);
        overflow: auto;
        padding: 14px 14px 18px;
        display: none;
        scrollbar-gutter: stable;
      }

      #company-panel.is-visible {
        display: block;
      }

      #details {
        right: 16px;
        bottom: 16px;
        width: min(380px, calc(100vw - 32px));
        max-height: min(52vh, 420px);
        overflow: auto;
        padding: 14px 16px 16px;
        scrollbar-gutter: stable;
      }

      #details .muted {
        color: var(--muted);
      }

      #details .title {
        margin: 0 0 6px;
        font-size: 19px;
        font-weight: 800;
        line-height: 1.35;
      }

      #details .note {
        margin-top: 14px;
        padding: 12px 14px;
        border: 1px solid rgba(250, 255, 105, 0.22);
        border-left: 3px solid var(--accent);
        background: rgba(20, 20, 20, 0.96);
        color: var(--text);
        font-size: 14px;
        line-height: 1.75;
        box-shadow: inset 0 4px 18px rgba(0, 0, 0, 0.18);
      }

      #company-panel .muted {
        color: var(--muted);
      }

      #company-panel .title {
        margin: 0;
        font-size: 20px;
        font-weight: 800;
        line-height: 1.2;
      }

      #company-panel .section {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid var(--panel-border);
      }

      #company-panel .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin: 0 0 12px;
      }

      #company-panel .section-title {
        margin: 0;
        color: var(--accent-soft);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.4;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      #company-panel .company-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      #company-panel .company-card {
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: rgba(20, 20, 20, 0.96);
        padding: 10px 12px 12px;
        box-shadow: inset 0 4px 14px rgba(0, 0, 0, 0.16);
      }

      #company-panel .company-head {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) 54px;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      #company-panel .ticker-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 52px;
        padding: 4px 8px;
        border: 1px solid rgba(250, 255, 105, 0.28);
        border-radius: 999px;
        background: rgba(250, 255, 105, 0.06);
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.2;
        font-family:
          Inconsolata, Consolas, "SFMono-Regular", "Liberation Mono", monospace;
      }

      #company-panel .company-name {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.45;
        min-width: 0;
        word-break: break-word;
      }

      #company-panel .company-tail-space {
        display: block;
        width: 54px;
        min-width: 54px;
      }

      .related-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .related-chip {
        border: 1px solid var(--panel-border);
        border-radius: 999px;
        background: rgba(20, 20, 20, 0.96);
        color: var(--text);
        padding: 8px 12px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        transition:
          border-color 140ms ease,
          color 140ms ease,
          background-color 140ms ease,
          transform 140ms ease;
      }

      .related-chip:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(250, 255, 105, 0.06);
        transform: translateY(-1px);
      }

      .node {
        cursor: grab;
        stroke-width: 1.5px;
      }

      .node.theme,
      .node.supplemental_theme,
      .node.wikilink {
        stroke: rgba(0, 0, 0, 0.92);
      }

      .label {
        pointer-events: none;
        fill: rgba(255, 255, 255, 0.92);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .faded {
        opacity: 0.08;
      }

      #company-panel,
      #details {
        scrollbar-width: thin;
        scrollbar-color: rgba(250, 255, 105, 0.36) transparent;
      }

      #company-panel::-webkit-scrollbar,
      #details::-webkit-scrollbar {
        width: 10px;
      }

      #company-panel::-webkit-scrollbar-track,
      #details::-webkit-scrollbar-track {
        background: transparent;
      }

      #company-panel::-webkit-scrollbar-thumb,
      #details::-webkit-scrollbar-thumb {
        border: 2px solid transparent;
        border-radius: 999px;
        background: rgba(250, 255, 105, 0.36);
        background-clip: padding-box;
      }

      #company-panel::-webkit-scrollbar-thumb:hover,
      #details::-webkit-scrollbar-thumb:hover {
        background: rgba(250, 255, 105, 0.52);
        background-clip: padding-box;
      }

      @media (max-width: 960px) {
        #header,
        #stats {
          width: min(340px, calc(100vw - 32px));
        }

        #company-panel {
          top: auto;
          bottom: 16px;
          width: min(500px, calc(100vw - 32px));
          max-height: min(64vh, 660px);
        }
      }

      @media (max-width: 660px) {
        #company-panel {
          top: auto;
          left: 16px;
          right: 16px;
          bottom: 16px;
          width: auto;
          max-height: min(64vh, 660px);
        }

        #company-panel .company-list {
          grid-template-columns: minmax(0, 1fr);
        }

        #details,
        #stats {
          width: calc(100vw - 32px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="header" class="panel">
        <h1>Theme Graph</h1>
        <p>
          拖曳節點可調整位置，滑鼠滾輪可縮放。點擊節點後，左側會顯示上游、中游、下游與相關公司的
          ticker 和公司名稱；再次點擊同一個節點即可收合。
        </p>
      </div>
      <div id="stats" class="panel"></div>
      <div id="company-panel" class="panel">
        <h2>相關公司清單</h2>
        <div class="muted">
          點擊節點後，左側會顯示對應的公司清單；再次點擊同一個節點即可收合。
        </div>
      </div>
      <div id="details" class="panel">
        <h2>Details</h2>
        <div class="muted">點擊節點後，右下角會顯示主題說明與相關主題。</div>
      </div>
      <svg aria-label="theme graph"></svg>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
      const svg = d3.select("svg");
      const width = window.innerWidth;
      const height = window.innerHeight;
      const root = svg.append("g");
      const linkLayer = root.append("g");
      const nodeLayer = root.append("g");
      const labelLayer = root.append("g");
      const statsEl = document.getElementById("stats");
      const companyPanelEl = document.getElementById("company-panel");
      const detailsEl = document.getElementById("details");
      const defaultCompanyPanelHtml = [
        "<h2>相關公司清單</h2>",
        "<div class='muted'>點擊節點後，左側會顯示對應的公司清單；再次點擊同一個節點即可收合。</div>",
      ].join("");
      const defaultDetailsHtml = [
        "<h2>Details</h2>",
        "<div class='muted'>點擊節點後，右下角會顯示主題說明與相關主題。</div>",
      ].join("");

      const colors = {
        theme: getComputedStyle(document.documentElement)
          .getPropertyValue("--theme")
          .trim(),
        supplemental_theme: getComputedStyle(document.documentElement)
          .getPropertyValue("--supplemental-theme")
          .trim(),
        wikilink: getComputedStyle(document.documentElement)
          .getPropertyValue("--wikilink")
          .trim(),
      };

      const zoom = d3
        .zoom()
        .scaleExtent([0.2, 3.5])
        .on("zoom", (event) => root.attr("transform", event.transform));

      svg.call(zoom).on("click", (event) => {
        if (event.target === svg.node()) {
          const clearEvent = new CustomEvent("graph-clear-selection");
          window.dispatchEvent(clearEvent);
        }
      });

      Promise.all([
        fetch(`./theme_graph.json?ts=${Date.now()}`, {
          cache: "no-store",
        }).then((res) => res.json()),
        fetch(`./theme_company_map.json?ts=${Date.now()}`, {
          cache: "no-store",
        })
          .then((res) => res.json())
          .catch((err) => {
            console.error("Failed to load theme_company_map.json", err);
            return { themes: [] };
          }),
      ])
        .then(([graph, themeCompanyMap]) => render(graph, themeCompanyMap))
        .catch((err) => {
          companyPanelEl.classList.add("is-visible");
          companyPanelEl.innerHTML =
            "<h2>相關公司清單</h2><div class='muted'>無法載入 company map，請確認 `theme_company_map.json` 是否存在。</div>";
          detailsEl.innerHTML =
            "<h2>Details</h2><div class='muted'>無法載入 graph 資料，請確認 `theme_graph.json` 與 `theme_company_map.json` 是否存在。</div>";
          console.error(err);
        });

      function render(graph, themeCompanyMap) {
        statsEl.innerHTML = [
          "<h2>Stats</h2>",
          `<div class="row"><span>節點數:</span><span>${graph.node_counts.total}</span></div>`,
          `<div class="row"><span>主題數:</span><span>${graph.node_counts.themes}</span></div>`,
          `<div class="row"><span>補充主題數:</span><span>${graph.node_counts.supplemental_themes ?? 0}</span></div>`,
          `<div class="row"><span>連線數:</span><span>${graph.links.length}</span></div>`,
        ].join("");

        const nodes = graph.nodes.map((d) => ({ ...d }));
        const links = graph.links.map((d) => ({ ...d }));
        const nodeById = new Map(nodes.map((node) => [node.id, node]));
        const themeCompanyMapById = new Map(
          (themeCompanyMap?.themes || []).map((item) => [item.id, item]),
        );
        let selectedNodeId = null;

        const neighborMap = new Map();
        nodes.forEach((node) => neighborMap.set(node.id, new Set([node.id])));
        links.forEach((link) => {
          neighborMap.get(link.source)?.add(link.target);
          neighborMap.get(link.target)?.add(link.source);
        });

        const radius = d3
          .scaleSqrt()
          .domain([0, d3.max(nodes, (d) => d.degree) || 1])
          .range([7, 34]);

        const simulation = d3
          .forceSimulation(nodes)
          .force(
            "link",
            d3
              .forceLink(links)
              .id((d) => d.id)
              .distance((d) => (d.target_is_theme ? 164 : 124))
              .strength(0.55),
          )
          .force(
            "charge",
            d3.forceManyBody().strength((d) => (d.is_theme_page ? -480 : -310)),
          )
          .force("center", d3.forceCenter(width / 2, height / 2))
          .force(
            "collision",
            d3.forceCollide().radius((d) => radius(d.degree) + 3),
          )
          .force("x", d3.forceX(width / 2).strength(0.06))
          .force("y", d3.forceY(height / 2).strength(0.06));

        const link = linkLayer
          .selectAll("line")
          .data(links)
          .join("line")
          .attr("stroke", "var(--edge)")
          .attr("stroke-opacity", (d) =>
            d.target_type === "wikilink" ? 0.7 : 0.5,
          )
          .attr("stroke-width", (d) =>
            d.target_type === "wikilink"
              ? 1.8 + d.weight * 0.85
              : 1.2 + d.weight * 0.65,
          );

        const node = nodeLayer
          .selectAll("circle")
          .data(nodes)
          .join("circle")
          .attr("class", (d) => `node ${d.type}`)
          .attr("r", (d) => Math.max(d.radius_hint, radius(d.degree)))
          .attr("fill", (d) => colors[d.type] || "#ccc")
          .attr("opacity", 0.95)
          .call(
            d3
              .drag()
              .on("start", dragStarted)
              .on("drag", dragged)
              .on("end", dragEnded),
          )
          .on("click", (event, d) => {
            event.stopPropagation();
            if (selectedNodeId === d.id) {
              clearSelection();
              return;
            }
            selectNode(d);
            focusNode(d);
          });

        const label = labelLayer
          .selectAll("text")
          .data(nodes.filter((d) => d.is_theme_page || d.degree >= 2))
          .join("text")
          .attr("class", "label")
          .attr("text-anchor", "middle")
          .text((d) => d.label);

        simulation.on("tick", () => {
          link
            .attr("x1", (d) => d.source.x)
            .attr("y1", (d) => d.source.y)
            .attr("x2", (d) => d.target.x)
            .attr("y2", (d) => d.target.y);

          node.attr("cx", (d) => d.x).attr("cy", (d) => d.y);

          label
            .attr("x", (d) => d.x)
            .attr("y", (d) => d.y + radius(d.degree) + 14);
        });

        function selectNode(selected) {
          selectedNodeId = selected.id;
          companyPanelEl.classList.add("is-visible");
          const neighbors =
            neighborMap.get(selected.id) || new Set([selected.id]);

          node
            .classed("faded", (d) => !neighbors.has(d.id))
            .attr("opacity", (d) => (neighbors.has(d.id) ? 0.98 : 0.12));

          label
            .classed("faded", (d) => !neighbors.has(d.id))
            .attr("opacity", (d) => (neighbors.has(d.id) ? 1 : 0.18));

          link
            .classed(
              "faded",
              (d) => d.source.id !== selected.id && d.target.id !== selected.id,
            )
            .attr("stroke-opacity", (d) => {
              const isAdjacent =
                d.source.id === selected.id || d.target.id === selected.id;
              if (isAdjacent) {
                return d.target_type === "wikilink" ? 0.88 : 0.68;
              }
              return 0.08;
            });

          const adjacent = links
            .filter(
              (d) => d.source.id === selected.id || d.target.id === selected.id,
            )
            .sort((a, b) => b.weight - a.weight);

          const companyTheme = themeCompanyMapById.get(selected.id);
          const relatedItems = getRelatedThemes(selected, adjacent);

          companyPanelEl.innerHTML = [
            "<h2>相關公司清單</h2>",
            `<div class="title">${escapeHtml(selected.label)}</div>`,
            renderCompanySections(companyTheme),
          ].join("");

          detailsEl.innerHTML = [
            "<h2>Details</h2>",
            `<div class="title">${escapeHtml(selected.label)}</div>`,
            selected.note
              ? `<div class="note">&gt; ${escapeHtml(selected.note)}</div>`
              : "<div class='muted' style='margin-top:10px'>目前沒有主題說明。</div>",
            renderRelatedThemesSection(relatedItems),
          ].join("");

          detailsEl.querySelectorAll("[data-node-id]").forEach((el) => {
            el.addEventListener("click", () => {
              const id = el.getAttribute("data-node-id");
              const targetNode = nodes.find((node) => node.id === id);
              if (!targetNode) {
                return;
              }
              if (selectedNodeId === targetNode.id) {
                clearSelection();
                return;
              }
              selectNode(targetNode);
              focusNode(targetNode);
            });
          });
        }

        function clearSelection() {
          selectedNodeId = null;
          companyPanelEl.classList.remove("is-visible");
          companyPanelEl.innerHTML = defaultCompanyPanelHtml;
          detailsEl.innerHTML = defaultDetailsHtml;

          node.classed("faded", false).attr("opacity", 0.95);
          label.classed("faded", false).attr("opacity", 1);
          link
            .classed("faded", false)
            .attr("stroke-opacity", (d) =>
              d.target_type === "wikilink" ? 0.7 : 0.5,
            );
        }

        function dragStarted(event, d) {
          if (!event.active) {
            simulation.alphaTarget(0.3).restart();
          }
          d.fx = d.x;
          d.fy = d.y;
        }

        function dragged(event, d) {
          d.fx = event.x;
          d.fy = event.y;
        }

        function dragEnded(event, d) {
          if (!event.active) {
            simulation.alphaTarget(0);
          }
          d.fx = null;
          d.fy = null;
        }

        function focusNode(targetNode) {
          if (
            typeof targetNode.x !== "number" ||
            typeof targetNode.y !== "number"
          ) {
            return;
          }

          const scale = 1.78;
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;
          const transform = d3.zoomIdentity
            .translate(viewportWidth / 2, viewportHeight / 2)
            .scale(scale)
            .translate(-targetNode.x, -targetNode.y);

          svg.interrupt();
          svg
            .transition()
            .duration(360)
            .ease(d3.easeCubicOut)
            .call(zoom.transform, transform);
        }

        function getRelatedThemes(selected, adjacentLinks) {
          const explicitRelated = Array.isArray(selected.related_themes)
            ? selected.related_themes.filter(
                (item) => item && item.id && item.is_theme_page,
              )
            : [];

          if (explicitRelated.length) {
            return explicitRelated;
          }

          const derived = [];
          const seen = new Set();

          adjacentLinks.forEach((edge) => {
            const otherId =
              edge.source.id === selected.id ? edge.target.id : edge.source.id;
            if (!otherId || otherId === selected.id || seen.has(otherId)) {
              return;
            }

            const otherNode = nodeById.get(otherId);
            if (!otherNode?.is_theme_page) {
              return;
            }

            seen.add(otherId);
            derived.push({
              id: otherNode.id,
              label: otherNode.label,
              is_theme_page: true,
            });
          });

          return derived;
        }

        function renderCompanySections(companyTheme) {
          if (!companyTheme?.companies_by_role) {
            return [
              "<div class='section'>",
              "<div class='muted'>這個節點目前沒有對應的公司清單。</div>",
              "</div>",
            ].join("");
          }

          const roleOrder = ["upstream", "midstream", "downstream", "related"];
          const sections = roleOrder
            .map((role) => {
              const roleGroup = companyTheme.companies_by_role?.[role];
              const companies = Array.isArray(roleGroup?.companies)
                ? roleGroup.companies
                : [];

              if (!companies.length) {
                return "";
              }

              return [
                "<div class='section'>",
                "<div class='section-header'>",
                `<h3 class='section-title'>${escapeHtml(roleGroup.label_zh || roleGroup.label_en || role)}</h3>`,
                "</div>",
                `<div class='company-list'>${companies.map(renderCompanyCard).join("")}</div>`,
                "</div>",
              ].join("");
            })
            .filter(Boolean)
            .join("");

          if (sections) {
            return sections;
          }

          return [
            "<div class='section'>",
            "<div class='muted'>這個節點目前沒有對應的公司清單。</div>",
            "</div>",
          ].join("");
        }

        function renderCompanyCard(company) {
          return [
            "<article class='company-card'>",
            "<div class='company-head'>",
            `<span class='ticker-pill'>${escapeHtml(company.ticker || "-")}</span>`,
            `<div class='company-name'>${escapeHtml(company.company_name || "")}</div>`,
            "<span class='company-tail-space' aria-hidden='true'></span>",
            "</div>",
            "</article>",
          ].join("");
        }

        function renderRelatedThemesSection(relatedItems) {
          const related = relatedItems.length
            ? `<div class="related-list">${relatedItems
                .map(
                  (item) =>
                    `<button class="related-chip" data-node-id="${escapeAttr(item.id)}">${escapeHtml(item.label)}</button>`,
                )
                .join("")}</div>`
            : "<div class='muted'>目前沒有相關主題。</div>";

          return [
            "<div class='section'>",
            "<div class='section-header'>",
            "<h3 class='section-title'>相關主題</h3>",
            "</div>",
            related,
            "</div>",
          ].join("");
        }

        window.addEventListener("graph-clear-selection", clearSelection);
        clearSelection();
        svg.call(
          zoom.transform,
          d3.zoomIdentity
            .translate(window.innerWidth / 2, window.innerHeight / 2)
            .scale(1.22)
            .translate(-width / 2, -height / 2),
        );
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
